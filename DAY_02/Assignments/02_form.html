<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>College Registration Form</title>
  </head>
  <body>
    <main>
      <header>
        <h1>College Registration Form</h1>
        <p>Please fill out the form below to register your details.</p>
      </header>

      <form action="#" method="POST" enctype="multipart/form-data">
        
        <!-- Personal Information Section -->
        <fieldset>
          <legend><strong>Personal Information</strong></legend>
          
          <p>
            <label for="name"><strong>Full Name:</strong></label><br>
            <input type="text" placeholder="Enter your Full Name" id="name" name="fullname" required />
          </p>

          <p>
            <label for="email"><strong>Email Address:</strong></label><br>
            <input type="email" placeholder="Enter your email..." id="email" name="email" required />
          </p>

          <p>
            <label for="phone"><strong>Phone Number:</strong></label><br>
            <input type="tel" placeholder="Enter Phone Number" id="phone" name="phone" maxlength="10" pattern="[0-9]{10}" required />
          </p>

          <p>
            <label for="dob"><strong>Date of Birth:</strong></label><br>
            <input type="date" id="dob" name="dob" required />
          </p>

          <fieldset>
            <legend><strong>Gender</strong></legend>
            <input type="radio" id="male" name="gender" value="male" required/>
            <label for="male">Male</label>
            
            <input type="radio" id="female" name="gender" value="female" />
            <label for="female">Female</label>
            
            <input type="radio" id="others" name="gender" value="others" />
            <label for="others">Others</label>
          </fieldset>
        </fieldset>
        <br><br>

        <!-- Academic & Professional Details -->
        <fieldset>
          <legend><strong>Academic & Professional Details</strong></legend>

          <p>
            <label for="dept-select"><strong>Choose a Department:</strong></label><br>
            <select id="dept-select" name="dept" required>
              <option value="" disabled selected>--Please choose an option--</option>
              <option value="ece">ECE</option>
              <option value="cse">CSE</option>
              <option value="eee">EEE</option>
              <option value="mech">Mechanical</option>
              <option value="civil">Civil</option>
            </select>
          </p>

          <fieldset>
            <legend><strong>Technical Skills</strong></legend>
            <input type="checkbox" id="html" name="skills" value="html" />
            <label for="html">HTML</label>

            <input type="checkbox" id="css" name="skills" value="css" />
            <label for="css">CSS</label>

            <input type="checkbox" id="javascript" name="skills" value="javascript" />
            <label for="javascript">JavaScript</label>

            <input type="checkbox" id="react" name="skills" value="react" />
            <label for="react">React</label>
          </fieldset>

          <p>
            <label for="address"><strong>Permanent Address:</strong></label><br>
            <textarea id="address" name="address" rows="4" cols="50" placeholder="Enter your full address here..."></textarea>
          </p>

          <p>
            <label for="resume"><strong>Upload Resume:</strong></label><br>
            <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required/>
          </p>
        </fieldset>
        <br><br>

        <!-- Account Security Section -->
        <fieldset>
          <legend><strong>Account Security</strong></legend>
          <p>
            <label for="password"><strong>Account Password:</strong></label><br>
            <input type="password" placeholder="Create a password..." id="password" name="password" required minlength="8">
            <label for="confirmPassword"><strong>Confirm Password:</strong></label><br>
<input
    type="password"
    id="confirmPassword"
    name="confirmPassword"
    minlength="8"
    required>
          </p>
        </fieldset>

        <!-- Form Actions -->
        <p>
          <button type="submit">Submit Registration</button>
          <button type="reset">Reset Form</button>
        </p>

      </form>
    </main>
  </body>
</html>
