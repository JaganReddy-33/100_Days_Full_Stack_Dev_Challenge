<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product-card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="product-card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSPd-9PIcA6GXjX85aa_t1j02L_0Zzm_8e1DY8tJCsCmQ&s=10" alt="product-img" class="product-image">
        <div class="card-details">
            <div class="product-title">Amazing Product</div>
            <p class="product-price">$99.99</p>
            <p class="product-info">Lorem ipsum dolor sit amet consectetur adipisicing elit. Facilis corrupti distinctio iste beatae vel consequuntur, illum.</p>
            <button class="add-to-cart-btn">
                Add To Cart
            </button>
            <p class="discount-badge">20% OFF</p>
        </div>
    </div>
</body>
</html>
