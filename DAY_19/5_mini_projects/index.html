<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Slip Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="glass-card form-card">
            <h2>Salary Generator</h2>
            <div class="input-group">
                <label for="empName">Employee Name</label>
                <input type="text" id="empName" placeholder="Enter full name">
            </div>
            <div class="input-group">
                <label for="basicSalary">Basic Salary (₹)</label>
                <input type="number" id="basicSalary" placeholder="Enter basic salary">
            </div>
            <div class="input-group">
                <label for="bonus">Bonus (₹) <span class="optional">(Optional)</span></label>
                <input type="number" id="bonus" placeholder="Blank for default ₹5000">
            </div>
            <button id="generateBtn">Generate Slip</button>
        </div>

        <div class="glass-card slip-card" id="salarySlip">
            <div class="placeholder-text">Enter employee details to generate the salary slip view.</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
