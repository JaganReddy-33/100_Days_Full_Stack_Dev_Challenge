<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignments</title>
  </head>
  <body>
    <!-- task-1: -->
    <h1 id="title">JavaScript</h1>
    <button id="btn">change Text</button>

    <!-- task-2: -->
    <p id="para">Learning DOM</p>
    <button id="redBtn">Red</button>
    <button id="blueBtn">Blue</button>
    <br />
    <br />

    <!-- task-3:  -->
    <input type="text" id="name" placeholder="type here to see live typing.."/>
    <h2 id="output"></h2>

    <!-- task-4:  -->
    <input type="text" id="task" placeholder="enter your items to add..."/>
    <button id="addBtn">Add</button>

    <ul id="list"></ul>

    <!-- Task-5:  -->
    <h1 id="count">0</h1>

    <button id="dec">-</button>
    <button id="reset">Reset</button>
    <button id="inc">+</button>
    <br /><br />

    <!-- task-6:  -->
    <input type="password" id="password" placeholder="enter your password"/>
    <button id="toggle">Show</button>
    <br /><br />

    <!-- task-7: -->
    <textarea id="message" placeholder="type here to see your total Characters" maxlength="100"></textarea>
    <p id="countChar"></p>

    <!-- task-8:  -->
    <input id="search" placeholder="search here for below items.."/>

    <ul id="list">
      <li>Apple</li>
      <li>Banana</li>
      <li>Mango</li>
      <li>Orange</li>
    </ul>

    <br /><br />

    <!-- task-9:  -->
    <button id="themeBtn">Toggle Theme</button>

    <br />
    <br />

    <!-- task-10:  -->
    <input id="studentName" />

    <button id="addStudent">Add Student</button>

    <ul id="studentList"></ul>

    <br /><br />

    <!-- task-11: -->
    <input id="age" type="number" />

    <button id="check">Check</button>

    <p id="result"></p>

    <br /><br />

    <!-- task-12: -->
    <button id="colorBtn">Change Color</button>

    <br /><br />

    <!-- task-13: -->
    <input id="username" />
    <input id="userPassword" />

    <button id="login">Login</button>

    <p id="loginMessage"></p>

    <script src="basicsOfDOM.js"></script>
  </body>
</html>
