<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Profile Finder</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background-color: #0d1117;
        color: #c9d1d9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        background-color: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 24px;
        width: 100%;
        max-width: 400px;
        box-sizing: border-box;
        text-align: center;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }

      h2 {
        margin-top: 0;
        margin-bottom: 20px;
        font-weight: 600;
      }

      .search-box {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }

      input[type="text"] {
        flex: 1;
        background-color: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 8px 12px;
        color: #c9d1d9;
        font-size: 14px;
        outline: none;
      }

      input[type="text"]:focus {
        border-color: #58a6ff;
        box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
      }

      button {
        background-color: #238636;
        color: #ffffff;
        border: 1px solid rgba(240, 246, 252, 0.1);
        border-radius: 6px;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: #2ea043;
      }

      .profile-card {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #30363d;
        animation: fadeIn 0.3s ease-in-out;
      }

      .avatar {
        border-radius: 50%;
        border: 2px solid #30363d;
        margin-bottom: 12px;
      }

      .profile-name {
        margin: 4px 0;
        font-size: 20px;
      }

      .stats-container {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin: 12px 0;
        font-size: 14px;
      }

      .stat-item {
        color: #8b949e;
      }

      .stat-count {
        color: #c9d1d9;
        font-weight: 600;
      }

      .repo-info {
        font-size: 14px;
        margin: 8px 0;
      }

      .user-id {
        font-size: 12px;
        color: #8b949e;
        margin-bottom: 16px;
      }

      .profile-link {
        display: inline-block;
        color: #58a6ff;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
      }

      .profile-link:hover {
        text-decoration: underline;
      }

      .status-msg {
        color: #8b949e;
        font-size: 14px;
        margin-top: 16px;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>GitHub Profile Finder</h2>
      <div class="search-box">
        <input type="text" id="username" placeholder="Enter GitHub username" />
        <button id="searchBtn">Search</button>
      </div>
      <div id="profile"></div>
    </div>

    <script>
      const username = document.getElementById("username");
      const searchBtn = document.getElementById("searchBtn");
      const profile = document.getElementById("profile");

      searchBtn.addEventListener("click", async () => {
        if (username.value.trim() === "") {
          username.focus();
          return;
        }
        try {
          profile.innerHTML = `<p class="status-msg">Loading...</p>`;
          const url = `https://api.github.com/users/${username.value}`;
          const response = await fetch(url);
          if (response.status === 404) {
            profile.innerHTML = `<p class="status-msg">User does not exist!</p>`;
            return;
          }
          const user = await response.json();
          
          const displayName = user.name || user.login; 
          
          profile.innerHTML = `
            <div class="profile-card">
              <img class="avatar" src="${user.avatar_url}" width="120" alt="Avatar">
              <h3 class="profile-name">${displayName}</h3>
              <div class="stats-container">
                <span class="stat-item"><span class="stat-count">${user.followers}</span> followers</span>
                <span class="stat-item"><span class="stat-count">${user.following}</span> following</span>
              </div>
              <p class="repo-info">Public Repos: <strong>${user.public_repos}</strong></p>
              <p class="user-id">User ID: ${user.id}</p>
              <a class="profile-link" href="${user.html_url}" target="_blank">View GitHub Profile →</a>
            </div>
          `;
        } catch (error) {
          profile.innerHTML = `<p class="status-msg">Something went wrong!</p>`;
          console.error(error);
        }
      });

      username.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          searchBtn.click();
        }
      });
    </script>
  </body>
</html>
