<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task-2</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <h1>CSS -Practice DAY_05</h1>
    </header>
    <h3>Task -4</h3>

    <section>
      <div class="container">
        <div class="img-section">
          <h2>CHILDREN SHIRT</h2>
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Lorem ipsum
            dolor sit amet consectetur adipisicing elit.
          </p>

          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZmQ8PNuocBcFOWlqmhAGPnSir_O4LTRGVjnyZtuSK0A&s=10"
            alt="chilren-shirt"
            class="shirt-img"
          />
        </div>

        <div class="details">
          <p class="price">$45</p>
          <div class="rating-bar">
            <i class="fas fa-star" style="color: #ffcc00"></i>
            <i class="fas fa-star" style="color: #ffcc00"></i>
            <i class="fas fa-star" style="color: #ffcc00"></i>
            <i class="fas fa-star" style="color: #ffcc00"></i>
            <i class="far fa-star" style="color: #ccc"></i>
          </div>
          <div class="quantity-btns">
            <button><i class="fa-solid fa-minus"></i></button>
            <p>1</p>
            <button><i class="fa-solid fa-plus"></i></button>
          </div>
          <div class="sizes">
            <p>SIZE</p>
            <button>XS</button>
            <button>S</button>
            <button>M</button>
            <button>L</button>
            <button>XL</button>
          </div>
          <div class="colors">
            <p>COLORS</p>
            <span class="color-swatch" style="background: #000"></span>
            <span class="color-swatch selected" style="background: #e63946"></span>
          </div>

          <button class="add-cart">ADD TO CART</button>
        </div>
      </div>
    </section>
  </body>
</html>
